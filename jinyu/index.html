<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>金昱 設計方向提案</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100;300;400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Noto Sans TC', sans-serif;
  background: #111;
}

/* ── WRAPPER ── */
.wrap {
  display: flex;
  width: 300vw;
  height: 100dvh;
  transition: transform .42s cubic-bezier(.4,0,.2,1);
  will-change: transform;
}

/* Each panel exactly one screen */
.panel {
  width: 100vw;
  height: 100dvh;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── PANEL A ── */
.a {
  background: #F4F0E8;
}
.a .top {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 36px 40px;
  position: relative;
  overflow: hidden;
}
.a .ghost {
  position: absolute;
  right: -16px;
  top: -20px;
  font-size: min(52vw, 260px);
  font-weight: 900;
  color: rgba(139,107,30,.07);
  line-height: 1;
  letter-spacing: -.04em;
  user-select: none;
}
.a .tag { color: #A8802A; }
.a h1 { color: #1A1714; }
.a h1 em { color: #8B6B1E; }
.a .sub { color: #9A8B7C; }
.a .bar { background: linear-gradient(90deg,#F4F0E8,#DDD5C0 30%,#C49A30 60%,#8B6B1E 80%,#1A1714); }
.a .bottom { background: #EDE8DC; }
.a .chip { background: #F4F0E8; color: #8B6B1E; }
.a .demo { background: #F4F0E8; }
.a .dh { color: #1A1714; }
.a .da { color: #8B6B1E; }
.a .dl { color: #9A8B7C; }

/* ── PANEL B ── */
.b {
  background: #0D0B08;
}
.b .top {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 36px 40px;
  position: relative;
  overflow: hidden;
  background: radial-gradient(ellipse at 80% 0%, rgba(180,130,20,.18) 0%, transparent 55%);
}
.b .ghost {
  position: absolute;
  right: -16px;
  top: -20px;
  font-size: min(52vw, 260px);
  font-weight: 900;
  color: rgba(200,160,40,.05);
  line-height: 1;
  letter-spacing: -.04em;
  user-select: none;
}
.b .tag { color: #C49A30; }
.b h1 { color: #fff; }
.b h1 em { color: #E8C060; }
.b .sub { color: rgba(255,255,255,.35); }
.b .bar { background: linear-gradient(90deg,#111,#1C1810 30%,#C49A30 62%,#E8C060 82%,#FDF6DC); }
.b .bottom { background: #161410; }
.b .chip { background: rgba(255,255,255,.06); color: #C49A30; border: 1px solid rgba(196,154,48,.22); }
.b .demo { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06); }
.b .dh { color: #fff; }
.b .da { color: #E8C060; }
.b .dl { color: rgba(255,255,255,.28); }

/* ── PANEL C ── */
.c {
  background: #FAFAF8;
}
.c .top {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 36px 40px;
  position: relative;
  overflow: hidden;
}
.c .ghost {
  position: absolute;
  right: -16px;
  top: -20px;
  font-size: min(52vw, 260px);
  font-weight: 900;
  color: rgba(0,0,0,.04);
  line-height: 1;
  letter-spacing: -.04em;
  user-select: none;
}
.c .tag { color: #999; }
.c h1 { color: #1C1C1A; }
.c h1 em { color: #D4A820; }
.c .sub { color: #AAA; }
.c .bar { background: linear-gradient(90deg,#FFF,#EEE 30%,#1C1C1A 55%,#D4A820 78%,#AAA); }
.c .bottom { background: #EDEBE6; }
.c .chip { background: #E0DDD7; color: #555; }
.c .demo { background: #E0DDD7; }
.c .dh { color: #1C1C1A; }
.c .da { color: #D4A820; }
.c .dl { color: #AAA; }

/* ── SHARED ── */
.tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .24em;
  text-transform: uppercase;
  margin-bottom: 24px;
  position: relative;
  z-index: 1;
}

h1 {
  font-size: clamp(38px, 11vw, 64px);
  font-weight: 900;
  line-height: 1.12;
  letter-spacing: -.02em;
  margin-bottom: 20px;
  position: relative;
  z-index: 1;
}
h1 em { font-style: normal; }

.sub {
  font-size: 13px;
  font-weight: 300;
  letter-spacing: .1em;
  position: relative;
  z-index: 1;
}

.bar { height: 7px; flex-shrink: 0; }

.bottom {
  flex-shrink: 0;
  padding: 24px 36px 36px;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}

.chip {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 5px;
  letter-spacing: .04em;
}

.demo {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 16px 20px;
  border-radius: 10px;
}
.dh, .da {
  font-size: 28px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -.01em;
}
.dl {
  font-size: 13px;
  font-weight: 100;
  line-height: 1;
}

/* ── DOTS ── */
.dots {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 99;
  pointer-events: none;
}
.dot {
  height: 6px;
  width: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,.28);
  transition: all .35s ease;
}
.dot.on {
  width: 22px;
  background: rgba(255,255,255,.85);
}

/* desktop arrows */
.arr {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  z-index: 99;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.14);
  color: rgba(255,255,255,.7);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background .2s;
  -webkit-tap-highlight-color: transparent;
}
.arr:hover { background: rgba(255,255,255,.18); }
.arr.L { left: 14px; }
.arr.R { right: 14px; }
@media (hover:none) { .arr { display: none; } }
</style>
</head>
<body>

<div class="wrap" id="wrap">

  <!-- A -->
  <div class="panel a">
    <div class="top">
      <div class="ghost">A</div>
      <div class="tag">Direction A</div>
      <h1>你的條件，<br>我幫你<em>整理方向</em></h1>
      <div class="sub">釐清現況 · 掌握可能 · 規劃下一步</div>
    </div>
    <div class="bar"></div>
    <div class="bottom">
      <div class="chips">
        <span class="chip">米白底色</span>
        <span class="chip">暖金點綴</span>
        <span class="chip">極簡留白</span>
        <span class="chip">顧問質感</span>
      </div>
      <div class="demo">
        <span class="dh">標題</span>
        <span class="da">金</span>
        <span class="dl">輕量說明文字</span>
      </div>
    </div>
  </div>

  <!-- B -->
  <div class="panel b">
    <div class="top">
      <div class="ghost">B</div>
      <div class="tag">Direction B</div>
      <h1>找<em>阿哥</em><br>解燃眉之急</h1>
      <div class="sub">合法 · 專業 · 安全 · 一條龍服務</div>
    </div>
    <div class="bar"></div>
    <div class="bottom">
      <div class="chips">
        <span class="chip">深黑底色</span>
        <span class="chip">黃金大字</span>
        <span class="chip">衝擊力強</span>
        <span class="chip">廣告一致</span>
      </div>
      <div class="demo">
        <span class="dh">標題</span>
        <span class="da">金</span>
        <span class="dl">說明文字</span>
      </div>
    </div>
  </div>

  <!-- C -->
  <div class="panel c">
    <div class="top">
      <div class="ghost">C</div>
      <div class="tag">Direction C</div>
      <h1>你的問題<br>我先<em>聽</em></h1>
      <div class="sub">真人 · 真案例 · 不強迫辦理</div>
    </div>
    <div class="bar"></div>
    <div class="bottom">
      <div class="chips">
        <span class="chip">純白底色</span>
        <span class="chip">真人主視覺</span>
        <span class="chip">故事感</span>
        <span class="chip">建立信任</span>
      </div>
      <div class="demo">
        <span class="dh">標題</span>
        <span class="da">金</span>
        <span class="dl">說明文字</span>
      </div>
    </div>
  </div>

</div>

<div class="dots">
  <div class="dot on" id="d0"></div>
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
</div>

<button class="arr L" id="prev">
  <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
</button>
<button class="arr R" id="next">
  <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
</button>

<script>
var wrap = document.getElementById('wrap');
var dots = [document.getElementById('d0'),document.getElementById('d1'),document.getElementById('d2')];
var cur = 0, total = 3;

function go(i) {
  cur = Math.max(0, Math.min(total-1, i));
  wrap.style.transition = 'transform .42s cubic-bezier(.4,0,.2,1)';
  wrap.style.transform = 'translateX(-' + (cur * 100) + 'vw)';
  dots.forEach(function(d,j){ d.classList.toggle('on', j===cur); });
}

document.getElementById('prev').onclick = function(){ go(cur-1); };
document.getElementById('next').onclick = function(){ go(cur+1); };

var sx=0, sy=0, dragging=false, dx=0;
document.addEventListener('touchstart', function(e){
  sx = e.touches[0].clientX;
  sy = e.touches[0].clientY;
  dragging = true; dx = 0;
  wrap.style.transition = 'none';
}, {passive:true});

document.addEventListener('touchmove', function(e){
  if (!dragging) return;
  dx = e.touches[0].clientX - sx;
  var dy = e.touches[0].clientY - sy;
  if (Math.abs(dy) > Math.abs(dx)) { dragging=false; go(cur); return; }
  var pct = cur*100 - (dx/window.innerWidth)*100;
  wrap.style.transform = 'translateX(-' + pct + 'vw)';
}, {passive:true});

document.addEventListener('touchend', function(){
  if (!dragging) return;
  dragging = false;
  if (dx < -48 && cur < total-1) go(cur+1);
  else if (dx > 48 && cur > 0) go(cur-1);
  else go(cur);
});

document.addEventListener('keydown', function(e){
  if (e.key==='ArrowRight') go(cur+1);
  if (e.key==='ArrowLeft') go(cur-1);
});
</script>
</body>
</html>
